name: Build

on:
    push:
        branches:
            - master
        tags:
            - "v[0-9]*"

jobs:
    check-lint-and-test:
        name: Verify lint and test passed
        runs-on: ubuntu-latest
        steps:
            - name: Check lint workflow conclusion
              uses: actions/github-script@v7
              with:
                  script: |
                      const runs = await github.rest.actions.listWorkflowRunsForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        head_sha: context.sha,
                        per_page: 20,
                      });
                      const required = ['Lint', 'Test'];
                      for (const name of required) {
                        const run = runs.data.workflow_runs.find(
                          r => r.name === name && r.head_sha === context.sha
                        );
                        if (!run) {
                          core.setFailed(`Workflow "${name}" not found for this commit`);
                        } else if (run.conclusion !== 'success') {
                          core.setFailed(`Workflow "${name}" did not succeed (status: ${run.conclusion})`);
                        }
                      }

    build:
        name: Build & Push
        runs-on: ubuntu-latest
        needs: check-lint-and-test
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=raw,value=latest,enable=${{ github.ref_type == 'branch' }}
                      type=sha,format=long,prefix=sha-,enable=${{ github.ref_type == 'branch' }}
                      type=raw,value=stable,enable=${{ github.ref_type == 'tag' }}
                      type=ref,event=tag

            - name: Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
