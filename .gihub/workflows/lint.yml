name: Lint

on:
    push:
        branches:
            - master
        tags:
            - "v[0-9]*"
    pull_request:
        branches:
            - master

jobs:
    eslint:
        name: ESLint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

    shellcheck:
        name: Shellcheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run Shellcheck
              run: shellcheck install-arch.sh install-ubuntu.sh scripts/deploy.sh scripts/verify.sh

    hadolint:
        name: Hadolint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run Hadolint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                  dockerfile: Dockerfile
                  config: .hadolint.yaml
